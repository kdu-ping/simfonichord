<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><title>Glory Glory Halleluya</title></title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="container">

    <!-- ===== HEADER ===== -->
    <div class="header">

      <!-- TOMBOL BACK + MODE dalam satu baris -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">

        <!-- TOMBOL BACK -->
        <a href="../index.html" style="text-decoration: none; color: #888aaa; font-size: 28px;">&#11013;</a>

        <!-- TOMBOL DARK/LIGHT MODE -->
        <div style="display: flex; align-items: center; gap: 6px;">
          <span id="icon-moon" style="font-size: 16px; color: #e0e0ff;">&#9789;</span>
          <div onclick="toggleMode()" id="toggle-switch" style="width: 40px; height: 22px; background: #525f6d; border-radius: 20px; cursor: pointer; position: relative; transition: background 0.3s;">
            <div id="toggle-ball" style="width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: left 0.3s;"></div>
          </div>
          <span id="icon-sun" style="font-size: 16px; color: #888aaa;">&#9788;</span>
        </div>

      </div>

     <div class="song-title">Glory Glory Halleluya</div>
     <div class="song-artist">Lagu Rohani</div>

      <!-- TOMBOL TRANSPOSE -->
      <div style="margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px;">
        <button onclick="setKey('A')"  class="key-btn" id="key-A">A</button>
        <button onclick="setKey('Bb')" class="key-btn" id="key-Bb">Bb</button>
        <button onclick="setKey('B')"  class="key-btn" id="key-B">B</button>
        <button onclick="setKey('C')"  class="key-btn" id="key-C">C</button>
        <button onclick="setKey('C#')" class="key-btn" id="key-C#">C#</button>
        <button onclick="setKey('D')"  class="key-btn" id="key-D">D</button>
        <button onclick="setKey('D#')" class="key-btn" id="key-D#">D#</button>
        <button onclick="setKey('E')"  class="key-btn" id="key-E">E</button>
        <button onclick="setKey('F')"  class="key-btn" id="key-F">F</button>
        <button onclick="setKey('F#')" class="key-btn" id="key-F#">F#</button>
        <button onclick="setKey('G')"  class="key-btn" id="key-G">G</button>
        <button onclick="setKey('G#')" class="key-btn" id="key-G#">G#</button>
      </div>
    </div>

    <!-- ===== KONTEN LIRIK ===== -->
    <div class="content">

      <!-- GANTI SECTION DAN LIRIK DI BAWAH INI -->

      <!-- VERSE -->
<div class="section-label">Verse</div>

<div class="line">
  <div class="token"><span class="chord" id="c0">C</span><span class="lyric">Glory glory halle</span></div>
  <div class="token"><span class="chord" id="c1"> </span><span class="lyric">luyah</span></div>
</div>

<div class="line">
  <div class="token"><span class="chord" id="c2">F</span><span class="lyric">Glory glory halle</span></div>
  <div class="token"><span class="chord" id="c3">C</span><span class="lyric">luyah</span></div>
</div>

<div class="line">
  <div class="token"><span class="chord" id="c4"> </span><span class="lyric">Glory glory halle</span></div>
  <div class="token"><span class="chord" id="c5">E</span><span class="lyric">lu - </span></div>
  <div class="token"><span class="chord" id="c6">Am</span><span class="lyric">yah</span></div>
</div>

<div class="line">
  <div class="token"><span class="chord" id="c7"> </span><span class="lyric">Halle</span></div>
  <div class="token"><span class="chord" id="c8">Dm</span><span class="lyric">luya </span></div>
  <div class="token"><span class="chord" id="c9">G</span><span class="lyric">puji </span></div>
  <div class="token"><span class="chord" id="c10">C</span><span class="lyric">Hu!</span></div>
</div>

      <!-- tambah .line sesuai kebutuhan -->

    </div>
  </div>

<!-- ===== JAVASCRIPT ===== -->
  <script>

    // CHORD ORIGINAL LAGU
    const originalChords = {
      c0: 'C',  c1: '',
      c2: 'F',  c3: 'C',
      c4: '',   c5: 'E',  c6: 'Am',
      c7: '',   c8: 'Dm', c9: 'G', c10: 'C'
    };

    const rootKey = 'C';

  </script>
  <script src="../script.js"></script>

</body>
</html>
